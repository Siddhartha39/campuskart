<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CampusKart - Login/Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6e00ff, #a17aff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      padding: 30px;
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tab-btns {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .tab-btns button {
      flex: 1;
      padding: 12px;
      border: none;
      cursor: pointer;
      background: #eee;
      font-weight: bold;
      font-size: 16px;
      border-radius: 8px 8px 0 0;
      transition: background 0.3s ease;
    }

    .tab-btns button.active {
      background: #6e00ff;
      color: white;
    }

    form {
      display: none;
    }

    form.active {
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #6e00ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: #5000c2;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="tab-btns">
      <button id="loginTab" class="active">Login</button>
      <button id="signupTab">Sign Up</button>
    </div>

    <!-- ✅ LOGIN FORM -->
    <form id="loginForm" class="active">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <div class="msg" id="loginMsg"></div>
    </form>

    <!-- ✅ SIGNUP FORM -->
    <form id="signupForm">
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="text" name="role" placeholder="Role (Student/Worker)" required />
      <input list="collegeList" name="college" placeholder="Select or type college" required />
      <datalist id="collegeList">
        <option value="PSIT Kanpur">
        <option value="AKGEC Ghaziabad">
        <option value="KIET Ghaziabad">
        <option value="JSS Noida">
        <option value="G.L. Bajaj Greater Noida">
        <option value="Galgotias University">
      </datalist>
      <input type="email" name="email" placeholder="Email" required />
      <input type="tel" name="phone" placeholder="Mobile Number" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
      <div class="msg" id="signupMsg"></div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginMsg = document.getElementById('loginMsg');
    const signupMsg = document.getElementById('signupMsg');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      loginMsg.textContent = '';
      signupMsg.textContent = '';
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.add('active');
      loginForm.classList.remove('active');
      loginMsg.textContent = '';
      signupMsg.textContent = '';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(loginForm);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (!res.ok) {
        loginMsg.textContent = result.message;
        loginMsg.className = 'msg error';
      } else {
        loginMsg.textContent = result.message;
        loginMsg.className = 'msg';
        localStorage.setItem('campuskart_user', JSON.stringify(result.user));
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1000);
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(signupForm);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch('/api/users/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      signupMsg.textContent = result.message || 'Signup complete!';
      signupMsg.className = 'msg';
      signupForm.reset();
      setTimeout(() => {
        signupTab.click(); // Switch to login tab
      }, 1000);
    });
  </script>

</body>
</html>
